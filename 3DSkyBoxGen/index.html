<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nebula Skybox HDR Generator</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        colors: {
          cyanx:    { 300:'#67e8f9', 400:'#22d3ee', 500:'#06b6d4', 600:'#0891b2' },
          fuchsiax: { 300:'#f0abfc', 400:'#e879f9', 500:'#d946ef', 600:'#c026d3' },
          panel: '#0b1224',
          bg: '#05070f',
        },
        fontFamily: {
          sans: ['Inter', 'system-ui', 'sans-serif'],
          mono: ['JetBrains Mono', 'ui-monospace', 'monospace'],
        },
      },
    },
  };
</script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
  rel="stylesheet"
/>
<style>
  html, body { height: 100%; overflow: hidden; }
  body {
    background:
      radial-gradient(ellipse at 20% 10%, rgba(56,189,248,0.10), transparent 50%),
      radial-gradient(ellipse at 80% 90%, rgba(217,70,239,0.08), transparent 55%),
      #05070f;
    color: #d1d5db;
    font-family: 'Inter', sans-serif;
  }
  .panel-glass {
    background: rgba(11, 18, 36, 0.85);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(148, 163, 184, 0.10);
  }
  .label { font-size: 9.5px; text-transform: uppercase; letter-spacing: 0.07em; color: #94a3b8; }
  .value-readout {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: #cbd5e1;
    background: transparent;
    border: 1px solid transparent;
    padding: 1px 3px;
    width: 60px;
    text-align: right;
    -moz-appearance: textfield;
    outline: none;
    border-radius: 3px;
  }
  .value-readout:hover { background: rgba(255,255,255,0.04); border-color: rgba(148,163,184,0.12); }
  .value-readout:focus {
    background: rgba(15, 23, 42, 0.8);
    border-color: rgba(148, 163, 184, 0.4);
    color: white;
  }
  .value-readout::-webkit-outer-spin-button,
  .value-readout::-webkit-inner-spin-button {
    -webkit-appearance: none; margin: 0;
  }

  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #334155; }

  /* Sliders — left-side filled / right-side empty via --val custom property. */
  input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    background: transparent;
    height: 14px;
    cursor: pointer;
    --val: 50%;
  }
  input[type="range"]::-webkit-slider-runnable-track {
    height: 3px;
    background: linear-gradient(to right,
      #94a3b8 0%, #94a3b8 var(--val),
      #1e293b var(--val), #1e293b 100%);
    border-radius: 2px;
  }
  input[type="range"]::-moz-range-track {
    height: 3px;
    background: linear-gradient(to right,
      #94a3b8 0%, #94a3b8 var(--val),
      #1e293b var(--val), #1e293b 100%);
    border-radius: 2px;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    height: 10px; width: 10px;
    background: #e2e8f0;
    border: none;
    border-radius: 50%;
    margin-top: -3.5px;
    cursor: pointer;
  }
  input[type="range"]::-moz-range-thumb {
    height: 10px; width: 10px;
    background: #e2e8f0;
    border: none;
    border-radius: 50%;
    cursor: pointer;
  }
  /* Hue slider keeps its rainbow track regardless of --val */
  input[type="range"].hue-slider::-webkit-slider-runnable-track {
    background: linear-gradient(90deg,
      hsl(0,65%,55%), hsl(60,65%,55%), hsl(120,65%,55%),
      hsl(180,65%,55%), hsl(240,65%,55%), hsl(300,65%,55%), hsl(360,65%,55%));
  }
  input[type="range"].hue-slider::-moz-range-track {
    background: linear-gradient(90deg,
      hsl(0,65%,55%), hsl(60,65%,55%), hsl(120,65%,55%),
      hsl(180,65%,55%), hsl(240,65%,55%), hsl(300,65%,55%), hsl(360,65%,55%));
  }
  input[type="number"], select, input[type="text"] {
    background: #0f172a; border: 1px solid #1e293b; color: #cbd5e1;
    padding: 3px 6px; font-family: 'JetBrains Mono', monospace;
    font-size: 11px; border-radius: 3px;
  }
  input[type="color"] {
    -webkit-appearance: none; border: 1px solid #1e293b;
    width: 32px; height: 22px; padding: 0; background: none;
    cursor: pointer; border-radius: 4px;
  }
  input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
  input[type="color"]::-webkit-color-swatch { border: none; border-radius: 3px; }

  .sidebar { transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1); }
  .sidebar.hidden-bar { transform: translateX(-100%); }
  .sidebar.hidden-bar-right { transform: translateX(100%); }
  .toggle-pill { transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1), background 0.2s; }

  .checker {
    background-image:
      linear-gradient(45deg, #0a0f1c 25%, transparent 25%),
      linear-gradient(-45deg, #0a0f1c 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #0a0f1c 75%),
      linear-gradient(-45deg, transparent 75%, #0a0f1c 75%);
    background-size: 24px 24px;
    background-position: 0 0, 0 12px, 12px -12px, -12px 0;
    background-color: #050810;
  }

  .group-title {
    font-size: 10px; font-weight: 600; letter-spacing: 0.14em;
    color: #cbd5e1; text-transform: uppercase;
    margin-bottom: 6px; padding-bottom: 4px;
    border-bottom: 1px solid rgba(148,163,184,0.10);
    display: flex; justify-content: space-between; align-items: center;
  }
  .group-title .accent { color: #64748b; font-weight: 400; }

  .btn-primary {
    background: linear-gradient(135deg, #475569, #334155);
    color: #f1f5f9; font-weight: 600; padding: 8px 12px;
    border: 1px solid rgba(148,163,184,0.2);
    border-radius: 4px; width: 100%;
    transition: filter 0.15s, transform 0.05s; letter-spacing: 0.06em;
    font-size: 12px;
  }
  .btn-primary:hover { filter: brightness(1.2); }
  .btn-primary:active { transform: translateY(1px); }
  .btn-primary:disabled { filter: grayscale(0.6) brightness(0.6); cursor: not-allowed; }

  .btn-secondary {
    background: #0f172a; border: 1px solid #1e293b;
    color: #cbd5e1; padding: 4px 8px; border-radius: 4px;
    font-size: 10.5px; transition: border-color 0.15s, color 0.15s;
  }
  .btn-secondary:hover { border-color: rgba(148,163,184,0.5); color: #f1f5f9; }
  .btn-mini {
    background: rgba(15, 23, 42, 0.7); border: 1px solid #1e293b;
    color: #94a3b8; padding: 3px 6px; border-radius: 3px;
    font-size: 9.5px; letter-spacing: 0.04em;
    transition: border-color 0.15s, color 0.15s; width: 100%;
  }
  .btn-mini:hover { border-color: rgba(148,163,184,0.5); color: #cbd5e1; }
  .btn-mini-icon {
    background: rgba(15, 23, 42, 0.7); border: 1px solid #1e293b;
    color: #94a3b8; padding: 0; width: 20px; height: 20px;
    border-radius: 3px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600;
    transition: border-color 0.15s, background 0.15s, color 0.15s;
  }
  .btn-mini-icon:hover { border-color: rgba(148,163,184,0.5); background: rgba(255,255,255,0.04); color: #cbd5e1; }
  .btn-mini-icon:disabled { opacity: 0.35; cursor: not-allowed; }

  .toggle-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .switch {
    position: relative; width: 36px; height: 20px;
    background: #0f172a; border: 1px solid #1e293b; border-radius: 10px;
    cursor: pointer; transition: background 0.15s, border-color 0.15s;
  }
  .switch::after {
    content: ''; position: absolute; top: 2px; left: 2px;
    width: 14px; height: 14px; border-radius: 50%;
    background: #475569; transition: left 0.18s, background 0.18s;
  }
  .switch.on { background: rgba(148,163,184,0.15); border-color: rgba(148,163,184,0.5); }
  .switch.on::after { left: 18px; background: #cbd5e1; }

  #status-bar { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #64748b; }

  .fatal {
    background: #1a0b0b; border: 1px solid #7f1d1d; color: #fca5a5;
    padding: 16px 20px; border-radius: 8px;
    font-family: 'JetBrains Mono', monospace; font-size: 13px;
    max-width: 540px; max-height: 80vh; overflow-y: auto;
    white-space: pre-wrap;
  }

  .vm-btn { background: transparent; color: #94a3b8; transition: background 0.15s, color 0.15s; }
  .vm-btn:hover { color: #e2e8f0; }
  .vm-btn.vm-active {
    background: rgba(148,163,184,0.18);
    color: #f1f5f9;
  }
  #gl-canvas.grabbing { cursor: grabbing; }
  #gl-canvas.grab { cursor: grab; }

  .layer-card {
    background: rgba(15, 23, 42, 0.5);
    border: 1px solid rgba(148, 163, 184, 0.08);
    border-radius: 4px; margin-bottom: 5px; overflow: hidden;
  }
  .layer-card.disabled { opacity: 0.4; }
  .layer-head {
    display: flex; align-items: center; gap: 3px;
    padding: 3px 5px;
    background: rgba(11, 18, 36, 0.55);
    border-bottom: 1px solid rgba(148, 163, 184, 0.06);
  }
  .layer-card.collapsed .layer-head { border-bottom: none; }
  .layer-icon-btn {
    background: transparent; border: none; color: #64748b;
    width: 20px; height: 20px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 3px; cursor: pointer; font-size: 12px;
    transition: background 0.12s, color 0.12s;
  }
  .layer-icon-btn:hover { background: rgba(255,255,255,0.06); color: #cbd5e1; }
  .layer-icon-btn.on { color: #cbd5e1; }
  .layer-icon-btn.danger:hover { background: rgba(239,68,68,0.12); color: #fca5a5; }
  .layer-icon-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .layer-name {
    flex: 1; min-width: 0;
    background: transparent !important; border: none !important;
    color: #e2e8f0; font-size: 11px; font-weight: 500;
    padding: 1px 3px !important;
  }
  .layer-name:focus { outline: 1px solid rgba(148,163,184,0.3); border-radius: 3px; }
  .layer-badge {
    font-family: 'JetBrains Mono', monospace; font-size: 8.5px;
    padding: 1px 4px; border-radius: 2px; letter-spacing: 0.06em;
    flex-shrink: 0;
  }
  .layer-badge-nebula {
    background: rgba(125,211,252,0.08); color: #93c5fd;
    border: 1px solid rgba(125,211,252,0.18);
  }
  .layer-badge-stars {
    background: rgba(253,224,71,0.07); color: #fde68a;
    border: 1px solid rgba(253,224,71,0.18);
  }
  .layer-badge-galaxy {
    background: rgba(190,242,100,0.07); color: #d9f99d;
    border: 1px solid rgba(190,242,100,0.18);
  }
  .gal-bundled-block { border-left: 1px solid rgba(148,163,184,0.12); padding-left: 7px; margin-top: 4px; }
  .gal-bundled-block.hidden { display: none; }
  .content-mode-row { display: flex; gap: 2px; padding: 1px; background: #0f172a; border: 1px solid #1e293b; border-radius: 4px; }
  .content-mode-btn {
    flex: 1; padding: 3px 6px; background: transparent; border: none;
    color: #94a3b8; font-size: 10px; font-weight: 500; border-radius: 3px;
    cursor: pointer; transition: background 0.15s, color 0.15s;
  }
  .content-mode-btn:hover { color: #cbd5e1; }
  .content-mode-btn.active {
    background: rgba(148,163,184,0.15);
    color: #f1f5f9;
  }
  .layer-body { padding: 5px 8px 7px 8px; }
  .layer-card.collapsed .layer-body { display: none; }
  .row { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
  .row.slider-row { flex-direction: column; align-items: stretch; gap: 0; margin-bottom: 2px; }
  .slider-head { display: flex; justify-content: space-between; align-items: baseline; }
  .row select { flex: 1; }

  .palette-block, .warp-block, .detail-block, .gal-block {
    background: rgba(5, 7, 15, 0.4);
    border: 1px solid rgba(148, 163, 184, 0.05);
    border-radius: 3px; padding: 5px 6px;
    margin: 5px 0;
  }
  .palette-title, .warp-title, .detail-title, .gal-title {
    font-size: 9px; letter-spacing: 0.10em; text-transform: uppercase;
    margin-bottom: 4px; font-weight: 600;
    color: #94a3b8;
    display: flex; justify-content: space-between; align-items: center;
  }
  .hint {
    font-size: 9px; color: #64748b; font-style: italic;
    letter-spacing: 0.03em; margin-bottom: 4px; line-height: 1.35;
  }

  .swatches-edit { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; margin: 6px 0; }
  .swatch-input {
    -webkit-appearance: none;
    width: 100%; height: 26px; padding: 0;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 3px; cursor: pointer;
  }
  .swatch-input::-webkit-color-swatch-wrapper { padding: 0; }
  .swatch-input::-webkit-color-swatch { border: none; border-radius: 2px; }
  .palette-btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }

  .sub-card {
    background: rgba(11, 18, 36, 0.5);
    border: 1px solid rgba(148, 163, 184, 0.05);
    border-radius: 3px; padding: 4px 6px; margin-bottom: 3px;
  }
  .sub-card-head {
    display: flex; align-items: center; gap: 4px; margin-bottom: 3px;
  }
  .sub-idx {
    font-family: 'JetBrains Mono', monospace; font-size: 8.5px;
    color: #cbd5e1; background: rgba(148,163,184,0.10);
    padding: 1px 5px; border-radius: 2px; letter-spacing: 0.04em;
  }
  .sub-type-select { flex: 1; }
  .sub-empty {
    font-size: 9px; color: #64748b; text-align: center;
    padding: 4px 0; font-style: italic;
  }
  .nested-palette {
    border-top: 1px dashed rgba(255, 255, 255, 0.04);
    margin-top: 5px;
    padding-top: 5px;
  }

  .add-layer-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; margin-top: 8px; }
  .add-layer-row .btn-secondary { padding: 6px 4px; font-size: 10.5px; letter-spacing: 0.02em; }
  .hud-line { display: flex; justify-content: space-between; gap: 12px; }
</style>
</head>
<body class="text-slate-200">

<div class="flex h-screen w-screen relative overflow-hidden">

  <button
    id="toggle-sidebar"
    class="toggle-pill fixed top-4 left-4 z-30 bg-panel/90 hover:bg-slate-600/40 border border-slate-400/20 rounded-full w-9 h-9 flex items-center justify-center text-slate-400"
    title="Toggle controls (T)"
  >
    <svg id="toggle-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M15 18l-6-6 6-6"/>
    </svg>
  </button>

  <button
    id="toggle-right-sidebar"
    class="toggle-pill fixed top-4 right-4 z-30 bg-panel/90 hover:bg-slate-600/40 border border-slate-400/20 rounded-full w-9 h-9 flex items-center justify-center text-slate-400"
    title="Toggle right panel (Y)"
  >
    <svg id="toggle-right-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 18l6-6-6-6"/>
    </svg>
  </button>

  <aside id="sidebar" class="sidebar panel-glass w-[360px] h-full flex flex-col z-20 absolute left-0 top-0">
    <div class="px-5 pt-4 pb-3 border-b border-slate-400/10">
      <div class="flex items-center gap-2">
        <div class="w-7 h-7 rounded-md bg-gradient-to-br from-slate-600 to-slate-700 flex items-center justify-center text-slate-200 border border-slate-500/30">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
        </div>
        <div>
          <div class="text-white font-semibold tracking-wide">NEBULA / FORGE</div>
          <div class="text-xs text-slate-400 -mt-0.5">HDR Skybox Generator</div>
        </div>
      </div>
    </div>

    <div class="flex-1 overflow-y-auto px-5 py-5 space-y-5" id="controls-scroll">

      <div>
        <div class="group-title">
          <span>Nebula Layers <span class="accent">// stack</span></span>
          <span class="text-xs text-slate-500 normal-case tracking-normal" id="layer-count">0/8</span>
        </div>
        <div id="layers-list"></div>
        <div class="add-layer-row">
          <button id="add-nebula" class="btn-secondary">+ Nebula</button>
          <button id="add-stars"  class="btn-secondary">+ Stars</button>
          <button id="add-galaxy" class="btn-secondary">+ Galaxy</button>
          <button id="add-sun"    class="btn-secondary">+ Sun</button>
        </div>
      </div>

    </div>

    <div class="px-5 pb-5 pt-3 border-t border-slate-400/10 space-y-2">
      <button id="export-btn" class="btn-primary">EXPORT .HDR SKYBOX</button>
      <div id="status-bar" class="text-center pt-1">— ready —</div>
    </div>
  </aside>

  <aside id="right-sidebar" class="sidebar panel-glass w-[300px] h-full flex flex-col z-20 absolute right-0 top-0">
    <div class="px-5 pt-4 pb-3 border-b border-slate-400/10">
      <div class="flex items-center gap-2">
        <div class="w-7 h-7 rounded-md bg-gradient-to-br from-slate-600 to-slate-700 flex items-center justify-center text-slate-200 border border-slate-500/30">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
        </div>
        <div>
          <div class="text-white font-semibold tracking-wide">SETTINGS</div>
          <div class="text-xs text-slate-400 -mt-0.5">Configuration &amp; I/O</div>
        </div>
      </div>
    </div>

    <div class="flex-1 overflow-y-auto px-5 py-5 space-y-5">

      <div>
        <div class="group-title"><span>Global <span class="accent">// world</span></span></div>
        <div class="space-y-3">
          <div class="flex items-center justify-between gap-3">
            <span class="label">Master Seed</span>
            <div class="flex items-center gap-1">
              <input type="number" id="seed-input" value="1337" step="1" class="w-24 text-right" />
              <button id="seed-rand" class="btn-secondary" title="Randomize">⟳</button>
            </div>
          </div>
          <div class="flex items-center justify-between gap-3">
            <span class="label">Export Res</span>
            <select id="res-select" class="text-xs">
              <option value="1024">1024 × 512</option>
              <option value="2048" selected>2048 × 1024</option>
              <option value="4096">4096 × 2048</option>
            </select>
          </div>
          <div class="toggle-row">
            <span class="label">Hi-Res Preview</span>
            <div id="hires-switch" class="switch" title="Render preview at full export resolution"></div>
          </div>
        </div>
      </div>

      <div>
        <div class="group-title"><span>Preset <span class="accent">// I/O</span></span></div>
        <div class="space-y-3">
          <div class="flex items-center gap-2">
            <input type="text" id="preset-filename" placeholder="nebula_preset..." class="flex-1" />
          </div>
          <button id="save-preset" class="btn-primary">Save Preset</button>
          <button id="load-preset" class="btn-secondary w-full">Load Preset</button>
          <input type="file" id="preset-file-input" accept=".json,application/json" class="hidden" />
          <div id="preset-status" class="text-xs text-slate-400 font-mono break-words pt-1 text-center">— I/O ready —</div>
        </div>
      </div>

    </div>
  </aside>

  <main id="viewport" class="flex-1 h-full flex items-center justify-center checker relative ml-[360px] mr-[300px] transition-[margin] duration-300">
    <div id="canvas-wrap" class="relative w-full h-full flex items-center justify-center">
      <canvas id="gl-canvas" class="max-w-full max-h-full shadow-2xl rounded-sm" style="image-rendering: pixelated;"></canvas>
    </div>
    <div class="absolute bottom-3 right-4 text-xs text-slate-500 font-mono pointer-events-none select-none">
      <span id="preview-info">preview</span>
    </div>

    <div class="absolute top-4 right-4 z-10 flex gap-1 panel-glass rounded-md p-1">
      <button id="vm-equirect" class="vm-btn vm-active px-3 py-1.5 rounded text-xs font-semibold tracking-wide">EQUIRECT</button>

// ---------------------------------------------------------------------------
// Color

function hsl2rgb(h, s, l) {
  h = ((h % 360) + 360) % 360;
  s = Math.max(0, Math.min(1, s));
  l = Math.max(0, Math.min(1, l));
  const c = (1 - Math.abs(2 * l - 1)) * s;
  const x = c * (1 - Math.abs(((h / 60) % 2) - 1));
  const m = l - c / 2;
  let r, g, b;
  if      (h < 60)  [r,g,b] = [c, x, 0];
  else if (h < 120) [r,g,b] = [x, c, 0];
  else if (h < 180) [r,g,b] = [0, c, x];
  else if (h < 240) [r,g,b] = [0, x, c];
  else if (h < 300) [r,g,b] = [x, 0, c];
  else              [r,g,b] = [c, 0, x];
  return [r + m, g + m, b + m];
}
function rgb2hex(rgb) {
  const c = v => Math.max(0, Math.min(255, Math.round(v * 255))).toString(16).padStart(2, '0');

  if (t >= 1) return pal[pal.length - 1];

  const fi = Math.floor(scaled);
  const ff = scaled - fi;
  const c0 = pal[fi];
  const c1 = pal[Math.min(fi + 1, pal.length - 1)];
  return [
    c0[0] + (c1[0] - c0[0]) * ff,
    c0[1] + (c1[1] - c0[1]) * ff,
    c0[2] + (c1[2] - c0[2]) * ff

float snoise(vec3 v) {

  vec3 g  = step(x0.yzx, x0.xyz);
  vec3 l  = 1.0 - g;
  vec3 i1 = min(g.xyz, l.zxy);
  vec3 i2 = max(g.xyz, l.zxy);
  vec3 x1 = x0 - i1 + 1.0 * C.xxx;
  vec3 x2 = x0 - i2 + 2.0 * C.xxx;
  vec3 x3 = x0 - 1.0 + 3.0 * C.xxx;

  vec4 x_ = floor(j * ns.z);
  vec4 y_ = floor(j - 7.0 * x_);

  vec4 y  = y_ * ns.x + ns.yyyy;

  vec4 s1 = floor(b1) * 2.0 + 1.0;

  vec3 p1 = vec3(a0.zw, h.y);

  vec3 p3 = vec3(a1.zw, h.w);

float hash13(vec3 p) {

    dot(p, vec3(269.5, 183.3, 246.1)),
    dot(p, vec3(113.5, 271.9, 124.6))

float voronoi3(vec3 x) {

  vec3 f = fract(x);

  for (int k = -1; k <= 1; k++)
  for (int j = -1; j <= 1; j++)
  for (int i = -1; i <= 1; i++) {
    vec3 b = vec3(float(i), float(j), float(k));
    vec3 r = b - f + hash33(p + b);
    float d = dot(r, r);
    res = min(res, d);

  for (int y = -1; y <= 1; y++)

    vec3 ofs  = vec3(float(x), float(y), float(z));

    vec3 sc = cell + vec3(seed * 0.137, seed * 0.241, seed * 0.331);

      float t = max(0.0, 1.0 - d / radius);
      float bvar = mix(0.4, 1.0, hash13(sc + 5.7));
      total += pow(t, sharpness) * bvar;

float starLayerGalaxy(vec2 uv_frag, vec2 uv_w, float cellScale, float density, float radius, float sharpness, float seed, float a, float armPitch, float armCount, float twistN) {
  vec2 p = uv_w * cellScale;
  vec2 baseCell = floor(p);
  vec2 f = fract(p);
  float total = 0.0;
  for (int x = -1; x <= 1; x++)
  for (int y = -1; y <= 1; y++) {
    vec2 ofs  = vec2(float(x), float(y));
    vec2 cell = baseCell + ofs;
    vec3 sc = vec3(cell, seed * 0.137);
    float prob = hash13(sc + 17.31);
    if (prob < density) {
      vec3 jitter3 = hash33(sc);
      vec2 jitter = jitter3.xy;
      
      // Star position in warped space
      vec2 star_w = (cell + jitter) / cellScale;
      
      // Analytical inverse warp to unwarped space
      float r_w = length(star_w);
      float r_un = a * r_w / max(1.0 - r_w, 0.001);
      float phi = (armPitch / max(armCount, 1.0)) * log(max(r_un, 0.001) * 8.0) - (twistN / max(armCount, 1.0));
      
      float cosP = cos(-phi);
      float sinP = sin(-phi);
      vec2 star_un = vec2(
        star_w.x * cosP - star_w.y * sinP,
        star_w.x * sinP + star_w.y * cosP
      ) * (a + r_un);

      float J = a / max(pow(1.0 - r_w, 2.0), 0.001);

      float bvar = mix(0.4, 1.0, hash13(sc + 5.7));
      total += pow(t, sharpness) * bvar;

  t = clamp(t, 0.0, 0.999999);
  float scaled = t * float(count - 1);
  float fi = floor(scaled);
  float ff = scaled - fi;
  int i0 = int(fi);
  int i1 = min(i0 + 1, count - 1);
  return mix(cols[i0], cols[i1], ff);

uniform float uGalDiskRadius_${i};
uniform float uGalFalloffStart_${i};
uniform float uGalFalloffEnd_${i};
uniform float uEdgeNoise_${i};
uniform float uDiskBrightness_${i};
uniform vec3  uBulgeCoreColor_${i};
uniform vec3  uBulgeCoronaColor_${i};
uniform float uBulgeCoreSize_${i};
uniform float uBulgeSize_${i};
uniform float uBulgeFalloff_${i};
uniform float uBulgeBrightness_${i};
uniform int   uArmCount_${i};
uniform float uArmPitch_${i};
uniform float uArmContrast_${i};
uniform float uArmStrength_${i};
uniform float uArmTwist_${i};
uniform float uArmNoiseStrength_${i};
uniform float uArmNoiseScale_${i};
uniform float uStarDensity_${i};
uniform float uStarBrightness_${i};
uniform float uDustSize_${i};
uniform float uHeroSize_${i};
uniform vec3  uStarColor_${i};
`;
      layer.nebulaSubLayers.forEach((sub, j) => {
        src += `uniform float uGalNebScale_${i}_${j};
uniform int   uGalNebOctaves_${i}_${j};
uniform float uGalNebStrength_${i}_${j};
uniform float uGalNebSeed_${i}_${j};
uniform int   uGalNebPaletteCount_${i}_${j};
uniform vec3  uGalNebPalette_${i}_${j}[${MAX_PALETTE}];
`;
      });
    }
  });

  src += `

void main() {
  vec3 dir;
  if (uViewMode == 0) {
    float theta = (vUV.x - 0.5) * TAU;
    float phi   = (vUV.y - 0.5) * PI;
    float cp0   = cos(phi);
    dir = vec3(cp0 * cos(theta), sin(phi), cp0 * sin(theta));
  } else {
    vec2 ndc = vUV * 2.0 - 1.0;
    vec3 rayCam = normalize(vec3(1.0, ndc.y * uFovTan, ndc.x * uFovTan * uAspect));
    float cpit = cos(uPitch), spit = sin(uPitch);
    vec3 r1 = vec3(
      rayCam.x * cpit - rayCam.y * spit,
      rayCam.x * spit + rayCam.y * cpit,
      rayCam.z
    );
    float cyaw = cos(uYaw), syaw = sin(uYaw);
    dir = vec3(
      r1.x * cyaw + r1.z * syaw,
      r1.y,
     -r1.x * syaw + r1.z * cyaw
    );
  }

  vec3 finalColor = vec3(0.0);

  // Running galaxy mask. Defaults to 1.0 (no-op). Mask-mode galaxy layers
  // replace this value so all subsequent layer contributions are gated by
  // the galaxy's spiral disk.
  float galaxyMask = 1.0;
`;

  let isFirstContrib = true;
  layers.forEach((layer, i) => {
    if (!layer.enabled) return;
    if (layer.kind === 'nebula') {
      src += emitNebulaLayer(layer, i, isFirstContrib);
    } else if (layer.kind === 'stars') {
      src += emitStarsLayer(layer, i, isFirstContrib);
    } else if (layer.kind === 'galaxy') {
      src += emitGalaxyLayer(layer, i, isFirstContrib);
    }
    isFirstContrib = false;
  });

  src += `
  if (uTonemap) {
    finalColor = acesFilm(finalColor);
    finalColor = pow(max(finalColor, vec3(0.0)), vec3(1.0 / 2.2));
  }
  outColor = vec4(finalColor, 1.0);
}
`;
  return src;
}

function emitBlend(mode, colorExpr, opacityExpr, isFirst) {
  if (isFirst) return `finalColor = ${colorExpr} * ${opacityExpr};`;
  switch (mode) {
    case 'add':      return `finalColor += ${colorExpr} * ${opacityExpr};`;
    case 'multiply': return `finalColor *= mix(vec3(1.0), ${colorExpr}, ${opacityExpr});`;
    case 'overlay':  return `finalColor = mix(finalColor, blendOverlay(finalColor, ${colorExpr}), ${opacityExpr});`;
    case 'mix':      return `finalColor = mix(finalColor, ${colorExpr}, ${opacityExpr});`;
    case 'darken':   return `finalColor = mix(finalColor, min(finalColor, ${colorExpr}), ${opacityExpr});`;
    case 'lighten':  return `finalColor = mix(finalColor, max(finalColor, ${colorExpr}), ${opacityExpr});`;
    default:         return `finalColor += ${colorExpr} * ${opacityExpr};`;
  }
}

function emitNebulaLayer(layer, i, isFirst) {
  // Base noise sampling function (Simplex / fBm / Voronoi / Ridged)
  let baseCall;
  switch (layer.type) {
    case 'simplex': baseCall = `snoise(baseP + warp)`; break;
    case 'fbm':     baseCall = `fbm_simplex(baseP + warp, uOctaves_${i})`; break;
    case 'voronoi': baseCall = `fbm_voronoi(baseP + warp, uOctaves_${i})`; break;
    case 'ridged':  baseCall = `fbm_ridged(baseP + warp, uOctaves_${i})`; break;
    default:        baseCall = `fbm_simplex(baseP + warp, uOctaves_${i})`;
  }
  const warpFn = fbmFnFor(layer.warpType);

  // Detail sub-layer emission. Each samples at ABSOLUTE scale (dir * uDetailScale)
  // — not relative to base — and is GATED by the running shaped value (mask)
  // so detail only appears where the base nebula already exists. The mask is
  // re-clamped after each contribution, so subsequent detail layers stack on
  // top of the previous detail's mask.
  let detailCode = '';
  layer.detailLayers.forEach((dl, j) => {
    const fn = fbmFnFor(dl.type);
    detailCode += `    {
      vec3 dp = dir * uDetailScale_${i}_${j} + sOfs;
      float d = ${fn}(dp, uDetailOct_${i}_${j});
      float mask = clamp(shaped, 0.0, 1.0);
      shaped = max(shaped + d * uDetailStrength_${i}_${j} * mask, 0.0);
    }\n`;
  });

  const blend = emitBlend(layer.blendMode, 'lyrColM', `uOpacity_${i}`, isFirst);
  return `
  // ── Layer ${i} — ${layer.kind}/${layer.type}/${layer.blendMode} ──
  {
    vec3 sOfs = vec3(uLayerSeed_${i} * 0.137, uLayerSeed_${i} * 0.241, uLayerSeed_${i} * 0.331);
    sOfs += vec3(uSeed * 0.0173, uSeed * 0.0211, uSeed * 0.0257);

    // Base position — defines big patch frequency.
    vec3 baseP = dir * uScale_${i} + sOfs;

    // Single domain warp. Samples at ABSOLUTE scale, decoupled from baseScale.
    vec3 warp = vec3(0.0);
    {
      vec3 wp = dir * uWarpScale_${i} + sOfs;
      vec3 w = vec3(
        ${warpFn}(wp,                       uWarpOct_${i}),
        ${warpFn}(wp + vec3(5.2, 1.3, 2.1), uWarpOct_${i}),
        ${warpFn}(wp + vec3(3.7, 4.4, 6.8), uWarpOct_${i})
      );
      warp = w * uWarpStrength_${i};
    }

    // Base noise → the "big patches" mask source.
    float n = ${baseCall};
    float shaped = pow(max(n * 0.5 + 0.5, 0.0), uFalloff_${i}) * uDensity_${i};

    // Mask-gated detail (each sub-layer at its own absolute frequency).
${detailCode}
    float t = clamp(shaped, 0.0, 1.0);
    vec3 palCol = palette(t, uPalette_${i}, uPaletteCount_${i});
    vec3 lyrCol = palCol * shaped;
    vec3 lyrColM = lyrCol * galaxyMask;
    ${blend}
  }
`;
}

function emitStarsLayer(layer, i, isFirst) {
  const blend = emitBlend(layer.blendMode, 'sColM', `uOpacity_${i}`, isFirst);
  return `
  // ── Layer ${i} — stars/${layer.blendMode} ──
  {
    float seedA = uLayerSeed_${i} + uSeed * 0.013;
    float seedB = uLayerSeed_${i} + uSeed * 0.013 + 100.0;
    float sA = starLayer(dir, 220.0, uStarDensity_${i} * 0.30, uDustSize_${i}, 8.0, seedA);
    float sB = starLayer(dir, 60.0,  uStarDensity_${i} * 0.05, uHeroSize_${i}, 4.0, seedB);
    vec3 sCol = uStarColor_${i} * (sA * uStarBrightness_${i} * 0.35 + sB * uStarBrightness_${i});
    vec3 sColM = sCol * galaxyMask;
    ${blend}
  }
`;
}

function emitGalaxyLayer(layer, i, isFirst) {
  const isMask = layer.contentMode === 'mask';

  // Bundled internal content (nebula sub-layers + stars within the spiral mask).
  // Omitted entirely in mask mode — only the bulge is drawn there.
  let bundled = '';
  if (!isMask) {
    let nebSubLayersCode = '';
    layer.nebulaSubLayers.forEach((sub, j) => {
      let gnCall = '';
      switch (sub.type) {
        case 'simplex': gnCall = `snoise(gnP) * 0.5 + 0.5`; break;
        case 'fbm':     gnCall = `fbm_simplex(gnP, uGalNebOctaves_${i}_${j}) * 0.5 + 0.5`; break;
        case 'voronoi': gnCall = `fbm_voronoi(gnP, uGalNebOctaves_${i}_${j}) * 0.5 + 0.5`; break;
        case 'ridged':  gnCall = `fbm_ridged(gnP, uGalNebOctaves_${i}_${j}) * 0.5 + 0.5`; break;
        default:        gnCall = `fbm_simplex(gnP, uGalNebOctaves_${i}_${j}) * 0.5 + 0.5`;
      }
      
      const subBlend = j === 0
        ? `galNebulaColor = subCol * uGalNebStrength_${i}_${j};`
        : (sub.blendMode === 'add'      ? `galNebulaColor += subCol * uGalNebStrength_${i}_${j};`
         : sub.blendMode === 'multiply' ? `galNebulaColor *= mix(vec3(1.0), subCol, uGalNebStrength_${i}_${j});`
         : sub.blendMode === 'overlay'  ? `galNebulaColor = mix(galNebulaColor, blendOverlay(galNebulaColor, subCol), uGalNebStrength_${i}_${j});`
         : sub.blendMode === 'mix'      ? `galNebulaColor = mix(galNebulaColor, subCol, uGalNebStrength_${i}_${j});`
         : sub.blendMode === 'darken'   ? `galNebulaColor = mix(galNebulaColor, min(galNebulaColor, subCol), uGalNebStrength_${i}_${j});`
         : sub.blendMode === 'lighten'  ? `galNebulaColor = mix(galNebulaColor, max(galNebulaColor, subCol), uGalNebStrength_${i}_${j});`
         : `galNebulaColor += subCol * uGalNebStrength_${i}_${j};`);

      nebSubLayersCode += `
    {
      vec3 gnP = vec3(uv_nebula, uGalNebSeed_${i}_${j} * 0.1) * uGalNebScale_${i}_${j};
      float gn = clamp(${gnCall}, 0.0, 1.0);
      vec3 gnPal = palette(gn, uGalNebPalette_${i}_${j}, uGalNebPaletteCount_${i}_${j});
      vec3 subCol = gnPal * gn;
      ${subBlend}
    }
`;
    });

    bundled = `
    // Internal nebula (accumulating sub-layers)
    vec3 galNebulaColor = vec3(0.0);
    ${nebSubLayersCode}
    vec3 gnContrib = galNebulaColor * densityMask * uDiskBrightness_${i};

    // Internal stars — density modulated by spiral mask so they cluster in the arms.
    float gSeedA = uLayerSeed_${i} + 50.0 + uSeed * 0.013;
    float gSeedB = uLayerSeed_${i} + 150.0 + uSeed * 0.013;
    float gSoftVal = 0.2 * max(uGalDiskRadius_${i}, 0.01);
    float gSA = starLayerGalaxy(vec2(u_warp, v_warp), uv_spiral, 240.0, uStarDensity_${i} * 0.30 * densityMask, uDustSize_${i}, 8.0, gSeedA, gSoftVal, uArmPitch_${i}, float(uArmCount_${i}), twistN);
    float gSB = starLayerGalaxy(vec2(u_warp, v_warp), uv_spiral, 65.0,  uStarDensity_${i} * 0.05 * densityMask, uHeroSize_${i}, 4.0, gSeedB, gSoftVal, uArmPitch_${i}, float(uArmCount_${i}), twistN);
    vec3 gStars = uStarColor_${i} * (gSA * uStarBrightness_${i} * 0.35 + gSB * uStarBrightness_${i});

    galaxyColor += gnContrib + gStars;
`;
  }

  // In mask mode, this galaxy's spiral mask replaces the running galaxyMask
  // for all subsequent layers. Bundled-mode galaxies don't touch it.
  const maskUpdate = isMask ? `    galaxyMask = densityMask;\n` : '';
  const blend = emitBlend(layer.blendMode, 'galaxyColorM', `uOpacity_${i}`, isFirst);

  return `
  // ── Layer ${i} — galaxy/${layer.contentMode}/${layer.blendMode} ──
  {
    float gpYaw   = uGalYaw_${i};
    float gpPitch = uGalPitch_${i};
    vec3 gC = vec3(cos(gpPitch) * cos(gpYaw), sin(gpPitch), cos(gpPitch) * sin(gpYaw));
    vec3 wUp = abs(gC.y) > 0.9 ? vec3(1.0, 0.0, 0.0) : vec3(0.0, 1.0, 0.0);
    vec3 dE = normalize(cross(wUp, gC));
    vec3 dN = cross(gC, dE);

    float cr = cos(uGalRoll_${i}), sr = sin(uGalRoll_${i});
    vec3 dU  =  dE * cr + dN * sr;
    vec3 dV0 = -dE * sr + dN * cr;

    // V axis is foreshortened by cos(tilt). ctSafe clamp prevents NaN at edge-on;
    // both dU and dV0 are ⊥ gC by construction, so (u,v) is well-defined at any tilt.
    float ctSafe = max(abs(cos(uGalTilt_${i})), 0.02);
    float facingMask = smoothstep(0.0, 0.05, dot(dir, gC));
    float u_loc = dot(dir, dU);
    float v_loc = dot(dir, dV0) / ctSafe;

    // Spiral arm coordinate warping & breakup via noise
    float u_warp = u_loc;
    float v_warp = v_loc;
    if (uArmNoiseStrength_${i} > 0.001) {
      vec3 warpCoord = vec3(u_loc, v_loc, uLayerSeed_${i} * 0.2) * uArmNoiseScale_${i};
      u_warp += snoise(warpCoord) * uArmNoiseStrength_${i} * 0.2;
      v_warp += snoise(warpCoord + vec3(11.3, 7.1, 3.4)) * uArmNoiseStrength_${i} * 0.2;
    }
    float r_warp = sqrt(u_warp * u_warp + v_warp * v_warp);
    float theta_warp = atan(v_warp, u_warp);
    float r_loc = sqrt(u_loc * u_loc + v_loc * v_loc);
    float thetaG = atan(v_loc, u_loc);

    // Uniform-branched edge noise — skipped entirely when edgeNoise = 0.
    float effRadius = uGalDiskRadius_${i};
    if (uEdgeNoise_${i} > 0.001) {
      float edgeN = fbm_simplex(vec3(u_loc * 4.0, v_loc * 4.0, uLayerSeed_${i} * 0.3), 3);
      effRadius *= (1.0 + edgeN * uEdgeNoise_${i});
    }

    float diskMask = 1.0 - smoothstep(uGalFalloffStart_${i}, uGalFalloffEnd_${i}, r_warp / effRadius);
    diskMask *= facingMask;

    // Uniform-branched spiral — Sun mode (armStrength = 0) skips log/sin/pow/noise.
    float twistN = 0.0;
    float armMask = 1.0;
    if (uArmStrength_${i} > 0.001) {
      twistN = snoise(vec3(u_warp * 2.0, v_warp * 2.0, uLayerSeed_${i} * 0.1)) * uArmTwist_${i};
      float armPhase = theta_warp * float(uArmCount_${i}) - uArmPitch_${i} * log(max(r_warp, 0.001) * 8.0) + twistN;
      float armSignal = sin(armPhase) * 0.5 + 0.5;
      float am = pow(max(armSignal, 0.0), uArmContrast_${i});
      if (uArmNoiseStrength_${i} > 0.001) {
        float breakup = fbm_simplex(vec3(u_loc, v_loc, uLayerSeed_${i} * 0.3) * uArmNoiseScale_${i} * 1.5, 3) * 0.5 + 0.5;
        am *= mix(1.0, breakup, uArmNoiseStrength_${i});
      }
      armMask = mix(1.0, mix(0.15, 1.0, am), uArmStrength_${i});
    }

    float densityMask = diskMask * armMask;

    // Spiral warped coordinate space for nested sub-layers and stars
    vec2 uv_spiral = vec2(u_warp, v_warp);
    vec2 uv_nebula = vec2(u_warp, v_warp);
    if (uArmStrength_${i} > 0.001) {
      float phi = -(uArmPitch_${i} / max(float(uArmCount_${i}), 1.0)) * log(max(r_warp, 0.001) * 8.0) + (twistN / max(float(uArmCount_${i}), 1.0));
      float cosP = cos(phi);
      float sinP = sin(phi);
      float softRadius = (0.2 * max(uGalDiskRadius_${i}, 0.01)) + r_warp;
      uv_spiral = vec2(
        u_warp * cosP - v_warp * sinP,
        u_warp * sinP + v_warp * cosP
      ) / softRadius;

      // Custom warped coordinate space for nebula sub-layers to control swirl and stretch
      float phi_neb = phi * uGalNebulaWarp_${i};
      float cosP_neb = cos(phi_neb);
      float sinP_neb = sin(phi_neb);
      float scaleFactor = mix(1.0, 1.0 / softRadius, uGalNebulaRadialScale_${i});
      uv_nebula = vec2(
        u_warp * cosP_neb - v_warp * sinP_neb,
        u_warp * sinP_neb + v_warp * cosP_neb
      ) * scaleFactor;
    }

    // Two-tone bulge: core color near center, blended to corona at coreSize.
    float bulgeR = r_loc / max(uGalDiskRadius_${i}, 0.001);
    float coreT = smoothstep(0.0, max(uBulgeCoreSize_${i}, 0.001), bulgeR);
    vec3 bulgeTone = mix(uBulgeCoreColor_${i}, uBulgeCoronaColor_${i}, coreT);
    float bulgeFall = 1.0 / (1.0 + pow(bulgeR / max(uBulgeSize_${i}, 0.001), uBulgeFalloff_${i}));
    vec3 bulgeContrib = bulgeTone * uBulgeBrightness_${i} * bulgeFall * facingMask;

    vec3 galaxyColor = bulgeContrib;
${bundled}
    vec3 galaxyColorM = galaxyColor * galaxyMask;
    ${blend}
${maskUpdate}  }
`;
}

// ---------------------------------------------------------------------------
// WebGL2 bootstrap
// ---------------------------------------------------------------------------
const canvas = document.getElementById('gl-canvas');
let gl;
let program = null;
let uniformLocs = {};
let vao;

function fatal(msg) {
  document.getElementById('fatal-msg').textContent = msg;
  document.getElementById('fatal').classList.remove('hidden');
  throw new Error(msg);
}
function initGL() {
  gl = canvas.getContext('webgl2', { alpha: false, antialias: false, premultipliedAlpha: false });
  if (!gl) fatal('WebGL2 is not available in this browser.');
  const ext = gl.getExtension('EXT_color_buffer_float');
  if (!ext) fatal('EXT_color_buffer_float is required for floating-point HDR rendering, but is unavailable.');
  vao = gl.createVertexArray();
  gl.bindVertexArray(vao);
}
function compile(type, src) {
  const sh = gl.createShader(type);
  gl.shaderSource(sh, src);
  gl.compileShader(sh);
  if (!gl.getShaderParameter(sh, gl.COMPILE_STATUS)) {
    const log = gl.getShaderInfoLog(sh);
    const kind = type === gl.VERTEX_SHADER ? 'vertex' : 'fragment';
    console.error('=== ' + kind.toUpperCase() + ' SHADER SOURCE ===\n' + src);
    fatal(`Shader compile failed (${kind}):\n` + log);
  }
  return sh;
}
function buildProgram(vsSrc, fsSrc) {
  const vs = compile(gl.VERTEX_SHADER, vsSrc);
  const fs = compile(gl.FRAGMENT_SHADER, fsSrc);
  const prog = gl.createProgram();
  gl.attachShader(prog, vs);
  gl.attachShader(prog, fs);
  gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
    fatal('Program link failed: ' + gl.getProgramInfoLog(prog));
  }
  return prog;
}

function rebuildProgram() {
  const vsSrc = document.getElementById('vs').textContent.trim();
  const fsSrc = buildFragmentShader(state.layers);
  let newProgram;
  try { newProgram = buildProgram(vsSrc, fsSrc); }
  catch (e) { return; }
  if (program) gl.deleteProgram(program);
  program = newProgram;
  gl.useProgram(program);
  uniformLocs = {};
  for (const n of ['uSeed','uTonemap','uViewMode','uYaw','uPitch','uFovTan','uAspect']) {
    uniformLocs[n] = gl.getUniformLocation(program, n);
  }
  state.layers.forEach((layer, i) => {
    if (layer.kind === 'nebula') {
      for (const k of ['uScale','uOctaves','uFalloff','uDensity','uOpacity','uLayerSeed','uPaletteCount',
                       'uWarpScale','uWarpOct','uWarpStrength']) {
        uniformLocs[`${k}_${i}`] = gl.getUniformLocation(program, `${k}_${i}`);
      }
      uniformLocs[`uPalette_${i}`] = gl.getUniformLocation(program, `uPalette_${i}[0]`);
      layer.detailLayers.forEach((dl, j) => {
        for (const k of ['uDetailScale','uDetailOct','uDetailStrength']) {
          uniformLocs[`${k}_${i}_${j}`] = gl.getUniformLocation(program, `${k}_${i}_${j}`);
        }
      });
    } else if (layer.kind === 'stars') {
      for (const k of ['uStarDensity','uStarBrightness','uDustSize','uHeroSize','uStarColor','uOpacity','uLayerSeed']) {
        uniformLocs[`${k}_${i}`] = gl.getUniformLocation(program, `${k}_${i}`);
      }
    } else if (layer.kind === 'galaxy') {
      for (const k of [
        'uOpacity','uLayerSeed',
        'uGalNebulaWarp','uGalNebulaRadialScale',
        'uGalYaw','uGalPitch','uGalTilt','uGalRoll',
        'uGalDiskRadius','uGalFalloffStart','uGalFalloffEnd','uEdgeNoise','uDiskBrightness',
        'uBulgeCoreColor','uBulgeCoronaColor','uBulgeCoreSize','uBulgeSize','uBulgeFalloff','uBulgeBrightness',
        'uArmCount','uArmPitch','uArmContrast','uArmStrength','uArmTwist',
        'uArmNoiseStrength','uArmNoiseScale',
        'uStarDensity','uStarBrightness','uDustSize','uHeroSize','uStarColor',
      ]) {
        uniformLocs[`${k}_${i}`] = gl.getUniformLocation(program, `${k}_${i}`);
      }
      layer.nebulaSubLayers.forEach((sub, j) => {
        for (const k of ['uGalNebScale','uGalNebOctaves','uGalNebStrength','uGalNebSeed','uGalNebPaletteCount']) {
          uniformLocs[`${k}_${i}_${j}`] = gl.getUniformLocation(program, `${k}_${i}_${j}`);
        }
        uniformLocs[`uGalNebPalette_${i}_${j}`] = gl.getUniformLocation(program, `uGalNebPalette_${i}_${j}[0]`);
      });
    }
  });
}

function setUniforms(tonemap, opts) {
  opts = opts || {};
  gl.uniform1f(uniformLocs.uSeed, state.uSeed);
  gl.uniform1i(uniformLocs.uTonemap, tonemap ? 1 : 0);
  const isPerspective = !opts.forceEquirect && state.viewMode === 'perspective';
  gl.uniform1i(uniformLocs.uViewMode, isPerspective ? 1 : 0);
  gl.uniform1f(uniformLocs.uYaw, state.yaw);
  gl.uniform1f(uniformLocs.uPitch, state.pitch);
  const fovRad = state.fovDeg * Math.PI / 180.0;
  gl.uniform1f(uniformLocs.uFovTan, Math.tan(fovRad * 0.5));
  const aspect = opts.aspect != null ? opts.aspect : (canvas.width / Math.max(1, canvas.height));
  gl.uniform1f(uniformLocs.uAspect, aspect);

  state.layers.forEach((layer, i) => {
    const opacity = layer.enabled ? layer.opacity : 0;
    if (layer.kind === 'nebula') {
      gl.uniform1f(uniformLocs[`uScale_${i}`], layer.scale);
      gl.uniform1i(uniformLocs[`uOctaves_${i}`], layer.octaves | 0);
      gl.uniform1f(uniformLocs[`uFalloff_${i}`], layer.falloff);
      gl.uniform1f(uniformLocs[`uDensity_${i}`], layer.density);
      gl.uniform1f(uniformLocs[`uOpacity_${i}`], opacity);
      gl.uniform1f(uniformLocs[`uLayerSeed_${i}`], layer.layerSeed);
      gl.uniform1f(uniformLocs[`uWarpScale_${i}`], layer.warpScale);
      gl.uniform1i(uniformLocs[`uWarpOct_${i}`], layer.warpOctaves | 0);
      gl.uniform1f(uniformLocs[`uWarpStrength_${i}`], layer.warpStrength);
      const count = Math.max(1, Math.min(MAX_PALETTE, layer.paletteCount || 1));
      gl.uniform1i(uniformLocs[`uPaletteCount_${i}`], count);
      const palArr = new Float32Array(MAX_PALETTE * 3);
      for (let j = 0; j < MAX_PALETTE; j++) {
        const idx = Math.min(j, count - 1);
        const c = hexToRgb(layer.palette[idx] || '#000000');
        palArr[j*3] = c[0]; palArr[j*3+1] = c[1]; palArr[j*3+2] = c[2];
      }
      gl.uniform3fv(uniformLocs[`uPalette_${i}`], palArr);
      layer.detailLayers.forEach((dl, j) => {
        gl.uniform1f(uniformLocs[`uDetailScale_${i}_${j}`], dl.scale);
        gl.uniform1i(uniformLocs[`uDetailOct_${i}_${j}`], dl.octaves | 0);
        gl.uniform1f(uniformLocs[`uDetailStrength_${i}_${j}`], dl.strength);
      });
    } else if (layer.kind === 'stars') {
      gl.uniform1f(uniformLocs[`uStarDensity_${i}`], layer.starDensity);
      gl.uniform1f(uniformLocs[`uStarBrightness_${i}`], layer.starBrightness);
      gl.uniform1f(uniformLocs[`uDustSize_${i}`], layer.dustSize);
      gl.uniform1f(uniformLocs[`uHeroSize_${i}`], layer.heroSize);
      const c = hexToRgb(layer.starColor);
      gl.uniform3f(uniformLocs[`uStarColor_${i}`], c[0], c[1], c[2]);
      gl.uniform1f(uniformLocs[`uOpacity_${i}`], opacity);
      gl.uniform1f(uniformLocs[`uLayerSeed_${i}`], layer.layerSeed);
    } else if (layer.kind === 'galaxy') {
      gl.uniform1f(uniformLocs[`uOpacity_${i}`], opacity);
      gl.uniform1f(uniformLocs[`uLayerSeed_${i}`], layer.layerSeed);
      gl.uniform1f(uniformLocs[`uGalNebulaWarp_${i}`], layer.nebulaWarp ?? 1.0);
      gl.uniform1f(uniformLocs[`uGalNebulaRadialScale_${i}`], layer.nebulaRadialScale ?? 1.0);
      const deg2rad = Math.PI / 180.0;
      gl.uniform1f(uniformLocs[`uGalYaw_${i}`],   layer.yawDeg   * deg2rad);
      gl.uniform1f(uniformLocs[`uGalPitch_${i}`], layer.pitchDeg * deg2rad);
      gl.uniform1f(uniformLocs[`uGalTilt_${i}`],  layer.tiltDeg  * deg2rad);
      gl.uniform1f(uniformLocs[`uGalRoll_${i}`],  layer.rollDeg  * deg2rad);
      gl.uniform1f(uniformLocs[`uGalDiskRadius_${i}`],   layer.diskRadius);
      gl.uniform1f(uniformLocs[`uGalFalloffStart_${i}`], layer.diskFalloffStart);
      gl.uniform1f(uniformLocs[`uGalFalloffEnd_${i}`],   layer.diskFalloffEnd);
      gl.uniform1f(uniformLocs[`uEdgeNoise_${i}`],       layer.edgeNoise);
      gl.uniform1f(uniformLocs[`uDiskBrightness_${i}`], layer.diskBrightness);
      const bc = hexToRgb(layer.bulgeCoreColor);
      const bk = hexToRgb(layer.bulgeCoronaColor);
      gl.uniform3f(uniformLocs[`uBulgeCoreColor_${i}`],   bc[0], bc[1], bc[2]);
      gl.uniform3f(uniformLocs[`uBulgeCoronaColor_${i}`], bk[0], bk[1], bk[2]);
      gl.uniform1f(uniformLocs[`uBulgeCoreSize_${i}`],   layer.bulgeCoreSize);
      gl.uniform1f(uniformLocs[`uBulgeSize_${i}`],       layer.bulgeSize);
      gl.uniform1f(uniformLocs[`uBulgeFalloff_${i}`],    layer.bulgeFalloff);
      gl.uniform1f(uniformLocs[`uBulgeBrightness_${i}`], layer.bulgeBrightness);
      gl.uniform1i(uniformLocs[`uArmCount_${i}`],    layer.armCount | 0);
      gl.uniform1f(uniformLocs[`uArmPitch_${i}`],    layer.armPitch);
      gl.uniform1f(uniformLocs[`uArmContrast_${i}`], layer.armContrast);
      gl.uniform1f(uniformLocs[`uArmStrength_${i}`], layer.armStrength);
      gl.uniform1f(uniformLocs[`uArmTwist_${i}`],    layer.armTwist);
      gl.uniform1f(uniformLocs[`uArmNoiseStrength_${i}`], layer.armNoiseStrength);
      gl.uniform1f(uniformLocs[`uArmNoiseScale_${i}`],   layer.armNoiseScale);
      
      layer.nebulaSubLayers.forEach((sub, j) => {
        gl.uniform1f(uniformLocs[`uGalNebScale_${i}_${j}`], sub.scale);
        gl.uniform1i(uniformLocs[`uGalNebOctaves_${i}_${j}`], sub.octaves | 0);
        gl.uniform1f(uniformLocs[`uGalNebStrength_${i}_${j}`], sub.strength);
        gl.uniform1f(uniformLocs[`uGalNebSeed_${i}_${j}`], sub.layerSeed);
        const count = Math.max(1, Math.min(MAX_PALETTE, sub.paletteCount || 1));
        gl.uniform1i(uniformLocs[`uGalNebPaletteCount_${i}_${j}`], count);
        const palArr = new Float32Array(MAX_PALETTE * 3);
        for (let k = 0; k < MAX_PALETTE; k++) {
          const idx = Math.min(k, count - 1);
          const c = hexToRgb(sub.palette[idx] || '#000000');
          palArr[k*3] = c[0]; palArr[k*3+1] = c[1]; palArr[k*3+2] = c[2];
        }
        gl.uniform3fv(uniformLocs[`uGalNebPalette_${i}_${j}`], palArr);
      });

      gl.uniform1f(uniformLocs[`uStarDensity_${i}`],    layer.starDensity);
      gl.uniform1f(uniformLocs[`uStarBrightness_${i}`], layer.starBrightness);
      gl.uniform1f(uniformLocs[`uDustSize_${i}`],       layer.dustSize);
      gl.uniform1f(uniformLocs[`uHeroSize_${i}`],       layer.heroSize);
      const sc = hexToRgb(layer.starColor);
      gl.uniform3f(uniformLocs[`uStarColor_${i}`], sc[0], sc[1], sc[2]);
    }
  });
}

const PREVIEW_MAX_W_NORMAL = 1024;
function getExportRes() {
  return parseInt(document.getElementById('res-select').value, 10);
}
function resizePreview() {
  const wrap = document.getElementById('canvas-wrap');
  const rect = wrap.getBoundingClientRect();
  let w, h;
  if (state.viewMode === 'perspective') {
    const cap = state.hiResPreview ? 3200 : 1600;
    const capH = state.hiResPreview ? 2000 : 1000;
    w = Math.min(cap,  Math.floor(rect.width)  - 16);
    h = Math.min(capH, Math.floor(rect.height) - 16);
    if (w < 64) w = 64;
    if (h < 64) h = 64;
  } else {
    const maxW = state.hiResPreview ? getExportRes() : PREVIEW_MAX_W_NORMAL;
    w = Math.min(maxW, Math.floor(rect.width) - 16);
    if (w < 64) w = 64;
    h = Math.floor(w / 2);
    if (h > rect.height - 16) {
      h = Math.max(32, Math.floor(rect.height) - 16);
      w = h * 2;
    }
  }
  if (canvas.width !== w || canvas.height !== h) { canvas.width = w; canvas.height = h; }
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  const modeLabel = state.viewMode === 'perspective' ? '3D' : 'equirect';
  const hires = state.hiResPreview ? ' · HI-RES' : '';
  document.getElementById('preview-info').textContent = `${modeLabel} ${w}×${h}${hires}`;
}

let renderQueued = false, lastRender = 0;
const RENDER_DEBOUNCE_MS = 40;
function scheduleRender() {
  if (renderQueued) return;
  renderQueued = true;
  const now = performance.now();
  const wait = Math.max(0, RENDER_DEBOUNCE_MS - (now - lastRender));
  setTimeout(() => {
    renderQueued = false;
    lastRender = performance.now();
    requestAnimationFrame(renderPreview);
  }, wait);
}
function renderPreview() {
  if (!program) return;
  resizePreview();
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  gl.viewport(0, 0, canvas.width, canvas.height);
  gl.useProgram(program);
  gl.bindVertexArray(vao);
  setUniforms(true);
  gl.drawArrays(gl.TRIANGLES, 0, 3);
}

// ---------------------------------------------------------------------------
// HDR export pipeline — UNTOUCHED. Float FBO → readPixels → RGBE.
// ---------------------------------------------------------------------------
function renderToFloatFBO(width, height) {
  const tex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA32F, width, height, 0, gl.RGBA, gl.FLOAT, null);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  const fbo = gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
  gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);
  const status = gl.checkFramebufferStatus(gl.FRAMEBUFFER);
  if (status !== gl.FRAMEBUFFER_COMPLETE) {
    gl.bindFramebuffer(gl.FRAMEBUFFER, null);
    gl.deleteFramebuffer(fbo); gl.deleteTexture(tex);
    throw new Error('Float FBO incomplete: 0x' + status.toString(16));
  }
  gl.viewport(0, 0, width, height);
  gl.useProgram(program);
  gl.bindVertexArray(vao);
  setUniforms(false, { forceEquirect: true, aspect: width / height });
  gl.drawArrays(gl.TRIANGLES, 0, 3);
  const pixels = new Float32Array(width * height * 4);
  gl.readPixels(0, 0, width, height, gl.RGBA, gl.FLOAT, pixels);
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  gl.deleteFramebuffer(fbo); gl.deleteTexture(tex);
  return pixels;
}

function frexp(value) {
  if (value === 0 || !isFinite(value) || isNaN(value)) return [0, 0];
  let mantissa = value;
  let exponent = 0;
  let guard = 0;
  while (mantissa >= 1.0) { mantissa *= 0.5; exponent++; if (++guard > 2048) break; }
  while (mantissa <  0.5) { mantissa *= 2.0; exponent--; if (++guard > 2048) break; }
  if (mantissa >= 1.0) { mantissa *= 0.5; exponent++; }
  if (mantissa <  0.5 && mantissa > 0.0) { mantissa *= 2.0; exponent--; }
  return [mantissa, exponent];
}

function encodeHDR(pixels, width, height) {
  const header =
    '#?RADIANCE\n' +
    '# Generated by Nebula Forge (WebGL2)\n' +
    'FORMAT=32-bit_rle_rgbe\n' +
    'EXPOSURE=1.0\n' +
    '\n' +
    `-Y ${height} +X ${width}\n`;
  const headerBytes = new TextEncoder().encode(header);
  const body = new Uint8Array(width * height * 4);
  let outOff = 0;
  for (let y = height - 1; y >= 0; y--) {
    const rowStart = y * width * 4;
    for (let x = 0; x < width; x++) {
      const i = rowStart + x * 4;
      let r = pixels[i], g = pixels[i+1], b = pixels[i+2];
      if (r < 0 || isNaN(r)) r = 0;
      if (g < 0 || isNaN(g)) g = 0;
      if (b < 0 || isNaN(b)) b = 0;
      const m = Math.max(r, g, b);
      if (m < 1e-32) {
        body[outOff++] = 0; body[outOff++] = 0; body[outOff++] = 0; body[outOff++] = 0;
        continue;
      }
      const [mantissa, exponent] = frexp(m);
      const scale = (mantissa * 256.0) / m;
      let rb = Math.floor(r * scale), gb = Math.floor(g * scale), bb = Math.floor(b * scale);
      let eb = exponent + 128;
      if (rb < 0) rb = 0; else if (rb > 255) rb = 255;
      if (gb < 0) gb = 0; else if (gb > 255) gb = 255;
      if (bb < 0) bb = 0; else if (bb > 255) bb = 255;
      if (eb < 0) eb = 0; else if (eb > 255) eb = 255;
      body[outOff++] = rb; body[outOff++] = gb; body[outOff++] = bb; body[outOff++] = eb;
    }
  }
  const out = new Uint8Array(headerBytes.length + body.length);
  out.set(headerBytes, 0);
  out.set(body, headerBytes.length);
  return out;
}

function downloadBlob(bytes, filename) {
  const blob = new Blob([bytes], { type: 'image/vnd.radiance' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

async function exportHDR() {
  const btn = document.getElementById('export-btn');
  const status = document.getElementById('status-bar');
  const w = getExportRes(), h = w / 2;
  btn.disabled = true;
  status.textContent = `rendering ${w}×${h} float buffer…`;
  await new Promise(r => requestAnimationFrame(r));
  let pixels;
  try { pixels = renderToFloatFBO(w, h); }
  catch (e) { status.textContent = 'render failed: ' + e.message; btn.disabled = false; return; }
  status.textContent = `encoding RGBE…`;
  await new Promise(r => requestAnimationFrame(r));
  let bytes;
  try { bytes = encodeHDR(pixels, w, h); }
  catch (e) { status.textContent = 'encode failed: ' + e.message; btn.disabled = false; return; }
  let peak = 0;
  for (let i = 0; i < pixels.length; i += 4) {
    if (pixels[i]   > peak) peak = pixels[i];
    if (pixels[i+1] > peak) peak = pixels[i+1];
    if (pixels[i+2] > peak) peak = pixels[i+2];
  }
  const filename = `nebula_skybox_${state.uSeed}_${w}x${h}.hdr`;
  downloadBlob(bytes, filename);
  status.textContent = `saved ${filename}  ·  peak=${peak.toFixed(2)}`;
  btn.disabled = false;
  renderPreview();
}

// === Preset I/O ============================================================

const PRESET_FORMAT  = 'nebula-forge-preset';
const PRESET_VERSION = 1;

function stripIds(layer) {
  const { id, detailLayers, nebulaSubLayers, ...rest } = layer;
  const out = { ...rest };
  if (Array.isArray(detailLayers)) {
    out.detailLayers = detailLayers.map(({ id, ...d }) => d);
  }
  if (Array.isArray(nebulaSubLayers)) {
    out.nebulaSubLayers = nebulaSubLayers.map(({ id, ...d }) => d);
  }
  return out;
}

function captureThumbnail() {
  // Synchronous render → 2D-canvas downscale → dataURL.
  // Forces equirect so the saved thumb is always the canonical view.
  const prevView = state.viewMode;
  state.viewMode = 'equirect';
  resizePreview();
  renderPreview();
  const tmp = document.createElement('canvas');
  tmp.width = 256; tmp.height = 128;
  tmp.getContext('2d').drawImage(canvas, 0, 0, 256, 128);
  const url = tmp.toDataURL('image/png');
  state.viewMode = prevView;
  resizePreview();
  renderPreview();
  return url;
}

function serializePreset() {
  return {
    _format: PRESET_FORMAT,
    _version: PRESET_VERSION,
    _savedAt: new Date().toISOString(),
    thumbnail: captureThumbnail(),
    state: {
      uSeed: state.uSeed,
      viewMode: state.viewMode,
      yaw: state.yaw, pitch: state.pitch, fovDeg: state.fovDeg,
      hiResPreview: state.hiResPreview,
      exportRes: parseInt(document.getElementById('res-select').value, 10),
      layers: state.layers.map(stripIds),
    },
  };
}

function rebuildLayerFromSaved(saved) {
  // Route by kind so missing fields are filled from current defaults.
  const base = saved.kind === 'nebula' ? defaultNebulaLayer({})
             : saved.kind === 'stars'  ? defaultStarsLayer({})
             : saved.kind === 'galaxy' ? defaultGalaxyLayer({ preset: 'galaxy' })
             : null;
  if (!base) throw new Error(`unknown layer kind: ${saved.kind}`);
  const merged = { ...base, ...saved, id: nextId() };
  if (Array.isArray(saved.detailLayers)) {
    merged.detailLayers = saved.detailLayers.map(d => ({
      ...defaultDetailSubLayer({}), ...d, id: nextId(),
    }));
  }
  if (Array.isArray(saved.nebulaSubLayers)) {
    merged.nebulaSubLayers = saved.nebulaSubLayers.map(d => {
      const sub = { ...defaultGalaxyNebulaSubLayer({}), ...d, id: nextId() };
      regenerateLayerPalette(sub, true);
      return sub;
    });
  } else if (saved.kind === 'galaxy') {
    // Legacy preset migration: convert single legacy galaxy nebula into a new nebulaSubLayers array!
    merged.nebulaSubLayers = [
      defaultGalaxyNebulaSubLayer({
        type: 'simplex',
        scale: saved.nebulaScale ?? 4.0,
        octaves: saved.nebulaOctaves ?? 4,
        strength: saved.nebulaStrength ?? 1.0,
        layerSeed: saved.layerSeed ?? 0,
        blendMode: 'add',
        baseHue: saved.baseHue,
        harmony: saved.harmony,
        saturation: saved.saturation,
        lightness: saved.lightness,
      })
    ];
    if (Array.isArray(saved.palette)) {
      merged.nebulaSubLayers[0].palette = [...saved.palette];
      merged.nebulaSubLayers[0].paletteCount = saved.paletteCount || 1;
    }
  }
  return merged;
}

function applyPreset(parsed) {
  if (!parsed || parsed._format !== PRESET_FORMAT) {
    throw new Error('not a Nebula Forge preset');
  }
  if (parsed._version > PRESET_VERSION) {
    throw new Error(`preset version ${parsed._version} newer than supported (${PRESET_VERSION})`);
  }
  const s = parsed.state || {};
  if (!Array.isArray(s.layers)) throw new Error('preset has no layers');

  state.uSeed = Number.isFinite(s.uSeed) ? s.uSeed : 1337;
  state.viewMode = s.viewMode === 'perspective' ? 'perspective' : 'equirect';
  state.yaw = +s.yaw || 0;
  state.pitch = +s.pitch || 0;
  state.fovDeg = +s.fovDeg || 75;
  state.hiResPreview = !!s.hiResPreview;
  state.layers = s.layers.map(rebuildLayerFromSaved);

  syncGlobalUI(s.exportRes);
  rebuildProgram();
  renderLayerCards();
  resizePreview();
  renderPreview();
}

function syncGlobalUI(exportRes) {
  document.getElementById('seed-input').value = state.uSeed;
  if (exportRes) {
    const sel = document.getElementById('res-select');
    if ([...sel.options].some(o => +o.value === +exportRes)) sel.value = String(exportRes);
  }
  document.getElementById('hires-switch').classList.toggle('on', state.hiResPreview);
  // View mode buttons mirror state.viewMode — reuse existing apply via dispatching click is overkill;
  // just set the active class to match #vm-equirect / #vm-perspective logic.
  document.getElementById('vm-equirect').classList.toggle('vm-active', state.viewMode !== 'perspective');
  document.getElementById('vm-perspective').classList.toggle('vm-active', state.viewMode === 'perspective');
}

function savePreset() {
  const status = document.getElementById('preset-status');
  try {
    const obj = serializePreset();
    const json = JSON.stringify(obj, null, 2);
    const blob = new Blob([json], { type: 'application/json' });
    const name = (document.getElementById('preset-filename').value || `nebula_preset_${state.uSeed}`)
                   .replace(/\.nebula\.json$|\.json$/i, '') + '.nebula.json';
    downloadBlob(blob, name);                        // reuse existing helper from HDR export
    status.textContent = `saved ${name}`;
  } catch (e) {
    status.textContent = `save failed: ${e.message}`;
  }
}

function loadPreset(file) {
  const status = document.getElementById('preset-status');
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const parsed = JSON.parse(reader.result);
      applyPreset(parsed);
      status.textContent = `loaded ${state.layers.length} layer(s) from ${file.name}`;
    } catch (e) {
      status.textContent = `load failed: ${e.message}`;
    }
  };
  reader.onerror = () => { status.textContent = 'load failed: read error'; };
  reader.readAsText(file);
}

function esc(s) {
  return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;')
    .replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
function selectHTML(opts, current) {
  return opts.map(o =>
    `<option value="${o.v}"${o.v === current ? ' selected' : ''}>${o.n}</option>`
  ).join('');
}
function clampedPct(val, min, max) {
  const v = Math.max(min, Math.min(max, +val));
  return ((v - min) / Math.max(max - min, 1e-9)) * 100;
}
function sliderRow(key, label, val, min, max, step, fixed, extraClass) {
  const display = (+val).toFixed(fixed);
  const pct = clampedPct(val, min, max);
  const sv = Math.max(min, Math.min(max, +val));
  const cls = extraClass ? ` ${extraClass}` : '';
  return `
    <div class="row slider-row">
      <div class="slider-head">
        <span class="label">${label}</span>
        <input type="number" class="value-readout" value="${display}" step="${step}" data-num="${key}" data-fixed="${fixed}" />
      </div>
      <input type="range" min="${min}" max="${max}" step="${step}" value="${sv}" data-act="${key}" data-fixed="${fixed}" class="${cls}" style="--val: ${pct}%;" />
    </div>
  `;
}
function detailSliderRow(key, label, val, min, max, step, fixed, j) {
  const display = (+val).toFixed(fixed);
  const pct = clampedPct(val, min, max);
  const sv = Math.max(min, Math.min(max, +val));
  return `

      <div class="slider-head">
        <span class="label">${label}</span>
        <input type="number" class="value-readout" value="${display}" step="${step}" data-detail-num="${j}-${key}" data-detail-idx="${j}" data-detail-key="${key}" data-fixed="${fixed}" />
      </div>
      <input type="range" min="${min}" max="${max}" step="${step}" value="${sv}" data-detail-act="${key}" data-detail-idx="${j}" data-fixed="${fixed}" style="--val: ${pct}%;" />
    </div>
  `;
}
// Shared palette/harmony block — used by both nebula and bundled-galaxy bodies.
function buildPaletteBlock(layer) {
  return `
    <div class="palette-block">

function subSliderRow(key, label, val, min, max, step, fixed, sj, extraClass) {
  const display = (+val).toFixed(fixed);
  const pct = clampedPct(val, min, max);
  const sv = Math.max(min, Math.min(max, +val));
  const cls = extraClass ? ` ${extraClass}` : '';
  return `
    <div class="row slider-row">
      <div class="slider-head">
        <span class="label">${label}</span>
        <input type="number" class="value-readout" value="${display}" step="${step}" data-sub-num="${sj}-${key}" data-sub-idx="${sj}" data-sub-key="${key}" data-fixed="${fixed}" />
      </div>
      <input type="range" min="${min}" max="${max}" step="${step}" value="${sv}" data-sub-act="${key}" data-sub-idx="${sj}" data-fixed="${fixed}" class="${cls}" style="--val: ${pct}%;" />
    </div>
  `;
}

function buildSubSwatchesEdit(sub, sj) {
