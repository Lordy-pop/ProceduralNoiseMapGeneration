function renderLayerCards() {
  const container = document.getElementById('layers-list');
  container.innerHTML = '';
  state.layers.forEach((layer, idx) => {
    const card = document.createElement('div');
    card.className = 'layer-card';
    if (!layer.enabled) card.classList.add('disabled');
    if (layer.collapsed) card.classList.add('collapsed');
    card.dataset.layerId = layer.id;
    card.innerHTML = buildLayerCardHTML(layer);
    container.appendChild(card);
    wireLayerCard(card, layer, idx);
  });
  updateLayerCount();
}

function wireLayerCard(card, layer, idx) {
  const INT_FIELDS = /^(octaves|baseHue|saturation|lightness|warpOctaves|armCount|nebulaOctaves)$/;

  function setSliderFill(slider) {
    const min = +slider.min, max = +slider.max;
    const v = Math.max(min, Math.min(max, +slider.value));
    const pct = ((v - min) / Math.max(max - min, 1e-9)) * 100;
    slider.style.setProperty('--val', pct + '%');
  }

  // Number input may exceed slider range — slider clamps thumb position, state stores
  // the typed value. Blur normalizes the display to the stored value.
  function bindRangePair(slider, numEl, target, key, fixed, isInt, sideEffect) {
    function apply(v, source) {
      if (!isFinite(v)) return;
      if (isInt) v = Math.round(v);
      if (target[key] === v) return;   // skip no-op writes during continuous drag
      target[key] = v;
      const min = +slider.min, max = +slider.max;
      slider.value = Math.max(min, Math.min(max, v));
      setSliderFill(slider);
      if (source === 'slider' && numEl) {
        numEl.value = v.toFixed(fixed);
      }
      if (sideEffect) sideEffect();
      scheduleRender();
    }
    slider.addEventListener('input', () => apply(+slider.value, 'slider'));
    if (numEl) {
      numEl.addEventListener('input', () => apply(+numEl.value, 'num'));
      numEl.addEventListener('change', () => {
        numEl.value = (+target[key]).toFixed(fixed);
      });
    }
  }

  // --- Top-level sliders (layer params) ---
  card.querySelectorAll('input[type="range"][data-act]').forEach(slider => {
    if (slider.hasAttribute('data-detail-act')) return;
    const act = slider.dataset.act;
    const fixed = +slider.dataset.fixed;
    const numEl = card.querySelector(`input[type="number"][data-num="${act}"]`);
    const isInt = INT_FIELDS.test(act);
    const sideEffect = (act === 'baseHue' || act === 'saturation' || act === 'lightness')
      ? () => { regenerateLayerPalette(layer, true); refreshSwatches(card, layer); }
      : null;
    bindRangePair(slider, numEl, layer, act, fixed, isInt, sideEffect);
  });

  // --- Color inputs ---
  card.querySelectorAll('input[type="color"][data-act]').forEach(el => {
    const act = el.dataset.act;
    if (act === 'paletteStop') {
      const stop = +el.dataset.stop;
      el.addEventListener('input', () => {
        layer.palette[stop] = el.value;
        scheduleRender();
      });
    } else {
      el.addEventListener('input', () => { layer[act] = el.value; scheduleRender(); });
    }
  });

  // --- Layer name ---
  card.querySelectorAll('input[type="text"][data-act]').forEach(el => {
    el.addEventListener('input', () => { layer.name = el.value; });
  });

  // --- Selects ---
  card.querySelectorAll('select[data-act]').forEach(el => {
    if (el.hasAttribute('data-detail-act')) return;
    const act = el.dataset.act;
    el.addEventListener('change', () => {
      layer[act] = el.value;
      if (act === 'type' || act === 'blendMode' || act === 'warpType') {
        rebuildProgram();
      } else if (act === 'harmony') {
        regenerateLayerPalette(layer, true);
        refreshSwatches(card, layer);
      }
      scheduleRender();
    });
  });

  // --- Buttons ---
  card.querySelectorAll('button[data-act]').forEach(el => {
    const act = el.dataset.act;
    el.addEventListener('click', (e) => {
      e.preventDefault();
      if (act === 'contentMode') {
        const mode = el.dataset.mode;
        if (layer.contentMode === mode) return;
        layer.contentMode = mode;
        rebuildProgram();
        renderLayerCards();
        scheduleRender();
        return;
      }
      onLayerAction(act, layer, idx, card);
    });
  });

  // --- Detail sub-layer sliders ---
  card.querySelectorAll('input[type="range"][data-detail-act]').forEach(slider => {
    const act = slider.dataset.detailAct;
    const dj = +slider.dataset.detailIdx;
    const fixed = +slider.dataset.fixed;
    const numEl = card.querySelector(`input[type="number"][data-detail-num="${dj}-${act}"]`);
    const isInt = (act === 'octaves');
    const dl = layer.detailLayers[dj];
    if (!dl) return;
    bindRangePair(slider, numEl, dl, act, fixed, isInt, null);
  });

  // --- Detail sub-layer selects / buttons ---
  card.querySelectorAll('select[data-detail-act]').forEach(el => {
    const dj = +el.dataset.detailIdx;
    el.addEventListener('change', () => {
      const dl = layer.detailLayers[dj];
      if (!dl) return;
      dl.type = el.value;
      rebuildProgram();
      scheduleRender();
    });
  });
  card.querySelectorAll('button[data-detail-act]').forEach(el => {
    const dj = +el.dataset.detailIdx;
    el.addEventListener('click', (e) => {
      e.preventDefault();
      if (el.dataset.detailAct === 'delete') {
        layer.detailLayers.splice(dj, 1);
        rebuildProgram();
        renderLayerCards();
        scheduleRender();
      }
    });
  });

  // --- Galaxy sub-layer sliders ---
  card.querySelectorAll('input[type="range"][data-sub-act]').forEach(slider => {
    const act = slider.dataset.subAct;
    const sj = +slider.dataset.subIdx;
    const fixed = +slider.dataset.fixed;
    const numEl = card.querySelector(`input[type="number"][data-sub-num="${sj}-${act}"]`);
    const isInt = (act === 'octaves' || act === 'baseHue' || act === 'saturation' || act === 'lightness');
    const sub = layer.nebulaSubLayers[sj];
    if (!sub) return;
    const sideEffect = (act === 'baseHue' || act === 'saturation' || act === 'lightness')
      ? () => { regenerateLayerPalette(sub, true); refreshSubSwatches(card, sub, sj); }
      : null;
    bindRangePair(slider, numEl, sub, act, fixed, isInt, sideEffect);
  });

  // --- Galaxy sub-layer color inputs ---
  card.querySelectorAll('input[type="color"][data-sub-act]').forEach(el => {
    const sj = +el.dataset.subIdx;
    const sub = layer.nebulaSubLayers[sj];
    if (!sub) return;
    if (el.dataset.subAct === 'paletteStop') {
      const stop = +el.dataset.stop;
      el.addEventListener('input', () => {
        sub.palette[stop] = el.value;
        scheduleRender();
      });
    }
  });

  // --- Galaxy sub-layer selects ---
  card.querySelectorAll('select[data-sub-act]').forEach(el => {
    const sj = +el.dataset.subIdx;
    const act = el.dataset.subAct;
    el.addEventListener('change', () => {
      const sub = layer.nebulaSubLayers[sj];
      if (!sub) return;
      sub[act] = el.value;
      if (act === 'type' || act === 'blendMode') {
        rebuildProgram();
      } else if (act === 'harmony') {
        regenerateLayerPalette(sub, true);
        refreshSubSwatches(card, sub, sj);
      }
      scheduleRender();
    });
  });

  // --- Galaxy sub-layer buttons ---
  card.querySelectorAll('button[data-sub-act]').forEach(el => {
    const sj = +el.dataset.subIdx;
    const act = el.dataset.subAct;
    el.addEventListener('click', (e) => {
      e.preventDefault();
      const sub = layer.nebulaSubLayers[sj];
      if (!sub) return;
      if (act === 'delete') {
        layer.nebulaSubLayers.splice(sj, 1);
        rebuildProgram();
        renderLayerCards();
        scheduleRender();
      } else if (act === 'randomHue') {
        sub.baseHue = Math.floor(Math.random() * 360);
        regenerateLayerPalette(sub, true);
        const numEl = card.querySelector(`input[type="number"][data-sub-num="${sj}-baseHue"]`);
        if (numEl) numEl.value = sub.baseHue;
        const slider = card.querySelector(`input[type="range"][data-sub-act="baseHue"][data-sub-idx="${sj}"]`);
        if (slider) {
          slider.value = sub.baseHue;
          setSliderFill(slider);
        }
        refreshSubSwatches(card, sub, sj);
        scheduleRender();
      } else if (act === 'regenPalette') {
        regenerateLayerPalette(sub, true);
        refreshSubSwatches(card, sub, sj);
        scheduleRender();
      } else if (act === 'addPalette') {
        if ((sub.paletteCount || 1) < MAX_PALETTE) {
          sub.paletteCount = (sub.paletteCount || 1) + 1;
          regenerateLayerPalette(sub, false);
          refreshSubSwatches(card, sub, sj);
          const addBtn = card.querySelector(`button[data-sub-act="addPalette"][data-sub-idx="${sj}"]`);
          const rmBtn = card.querySelector(`button[data-sub-act="removePalette"][data-sub-idx="${sj}"]`);
          if (addBtn) addBtn.disabled = (sub.paletteCount >= MAX_PALETTE);
          if (rmBtn) rmBtn.disabled = (sub.paletteCount <= 1);
          scheduleRender();
        }
      } else if (act === 'removePalette') {
        if ((sub.paletteCount || 1) > 1) {
          sub.paletteCount = (sub.paletteCount || 1) - 1;
          refreshSubSwatches(card, sub, sj);
          const addBtn = card.querySelector(`button[data-sub-act="addPalette"][data-sub-idx="${sj}"]`);
          const rmBtn = card.querySelector(`button[data-sub-act="removePalette"][data-sub-idx="${sj}"]`);
          if (addBtn) addBtn.disabled = (sub.paletteCount >= MAX_PALETTE);
          if (rmBtn) rmBtn.disabled = (sub.paletteCount <= 1);
          scheduleRender();
        }
      }
    });
  });
}

function refreshSubSwatches(card, sub, sj) {
  const wrap = card.querySelector(`[data-sub-swatches="${sj}"]`);
  if (!wrap) return;
  wrap.innerHTML = buildSubSwatchesEdit(sub, sj);
  wrap.querySelectorAll('input[type="color"]').forEach(inp => {
    const stop = +inp.dataset.stop;
    inp.addEventListener('input', () => {
      sub.palette[stop] = inp.value;
      scheduleRender();
    });
  });
}

function refreshSwatches(card, layer) {
  const wrap = card.querySelector('[data-swatches]');
  if (!wrap) return;
  wrap.innerHTML = buildSwatchesEdit(layer);
  wrap.querySelectorAll('input[type="color"]').forEach(inp => {
    const stop = +inp.dataset.stop;
    inp.addEventListener('input', () => {
      layer.palette[stop] = inp.value;
      scheduleRender();
    });
  });
}

function onLayerAction(act, layer, idx, card) {
  switch (act) {
    case 'up':
      if (idx > 0) {
        [state.layers[idx - 1], state.layers[idx]] = [state.layers[idx], state.layers[idx - 1]];
        structuralChange();
      }
      break;
    case 'down':
      if (idx < state.layers.length - 1) {
        [state.layers[idx], state.layers[idx + 1]] = [state.layers[idx + 1], state.layers[idx]];
        structuralChange();
      }
      break;
    case 'enable':  layer.enabled = !layer.enabled; structuralChange(); break;
    case 'collapse': layer.collapsed = !layer.collapsed; renderLayerCards(); break;
    case 'delete':  state.layers.splice(idx, 1); structuralChange(); break;
    case 'randomHue': {
      layer.baseHue = Math.floor(Math.random() * 360);
      // Sync the paired range slider + number input + --val fill.
      const slider = card.querySelector('input[type="range"][data-act="baseHue"]');
      if (slider) {
        const min = +slider.min, max = +slider.max;
        slider.value = Math.max(min, Math.min(max, layer.baseHue));
        const pct = ((+slider.value - min) / Math.max(max - min, 1e-9)) * 100;
        slider.style.setProperty('--val', pct + '%');
      }
      const num = card.querySelector('input[type="number"][data-num="baseHue"]');
      if (num) num.value = layer.baseHue;
      regenerateLayerPalette(layer, true);
      refreshSwatches(card, layer);
      scheduleRender();
      break;
    }
    case 'regenPalette':
      regenerateLayerPalette(layer, true);
      refreshSwatches(card, layer);
      scheduleRender();
      break;
    case 'addPalette':
      if (layer.paletteCount < MAX_PALETTE) {
        layer.paletteCount++;
        layer.palette[layer.paletteCount - 1] = layer.palette[layer.paletteCount - 2] || '#000000';
        renderLayerCards();
        scheduleRender();
      }
      break;
    case 'removePalette':
      if (layer.paletteCount > 1) {
        layer.paletteCount--;
        renderLayerCards();
        scheduleRender();
      }
      break;
    case 'addDetail':
      if (layer.kind === 'nebula' && layer.detailLayers.length < MAX_DETAIL) {
        // New detail defaults to higher frequency than the last one
        // (progressive detail accumulation).
        const last = layer.detailLayers[layer.detailLayers.length - 1];
        const seedScale = last ? Math.min(32, last.scale * 2.0) : 4.0;
        layer.detailLayers.push(defaultDetailSubLayer({
          scale: seedScale, strength: 0.3, octaves: 3,
        }));
        rebuildProgram();
        renderLayerCards();
        scheduleRender();
      }
      break;
    case 'addGalNebulaSub':
      if (layer.kind === 'galaxy' && layer.nebulaSubLayers.length < MAX_GALAXY_SUB_LAYERS) {
        const last = layer.nebulaSubLayers[layer.nebulaSubLayers.length - 1];
        const seedScale = last ? Math.min(32, last.scale * 1.8) : 4.0;
        layer.nebulaSubLayers.push(defaultGalaxyNebulaSubLayer({
          scale: seedScale,
          strength: 0.5,
          octaves: 3,
          baseHue: layer.baseHue,
          harmony: layer.harmony,
        }));
        rebuildProgram();
        renderLayerCards();
        scheduleRender();
      }
      break;
  }
}

function structuralChange() {
  rebuildProgram();
  renderLayerCards();
  scheduleRender();
}

function addNebulaLayer() {
  if (state.layers.length >= MAX_LAYERS) return;
  const nebCount = state.layers.filter(l => l.kind === 'nebula').length;
  state.layers.push(defaultNebulaLayer({
    name: `Nebula ${nebCount + 1}`,
    baseHue: Math.floor(Math.random() * 360),
  }));
  structuralChange();
}
function addStarsLayer() {
  if (state.layers.length >= MAX_LAYERS) return;
  const starCount = state.layers.filter(l => l.kind === 'stars').length;
  state.layers.push(defaultStarsLayer({ name: `Stars ${starCount + 1}` }));
  structuralChange();
}
function addGalaxyLayer() {
  if (state.layers.length >= MAX_LAYERS) return;
  const n = state.layers.filter(l => l.kind === 'galaxy' && l.name.startsWith('Galaxy')).length;
  state.layers.push(defaultGalaxyLayer({ preset: 'galaxy', name: `Galaxy ${n + 1}` }));
  structuralChange();
}
function addSunLayer() {
  if (state.layers.length >= MAX_LAYERS) return;
  const n = state.layers.filter(l => l.kind === 'galaxy' && l.name.startsWith('Sun')).length;
  state.layers.push(defaultGalaxyLayer({ preset: 'sun', name: `Sun ${n + 1}` }));
  structuralChange();
}

// ---------------------------------------------------------------------------
// Sidebar toggle
// ---------------------------------------------------------------------------
function setupSidebarToggle() {
  const sidebar = document.getElementById('sidebar');
  const viewport = document.getElementById('viewport');
  const icon = document.getElementById('toggle-icon');
  let hidden = false;
  const toggle = () => {
    hidden = !hidden;
    if (hidden) {
      sidebar.classList.add('hidden-bar');
      viewport.style.marginLeft = '0';
      icon.innerHTML = '<path d="M9 18l6-6-6-6"/>';
    } else {
      sidebar.classList.remove('hidden-bar');
      viewport.style.marginLeft = '360px';
      icon.innerHTML = '<path d="M15 18l-6-6 6-6"/>';
    }
    setTimeout(() => { resizePreview(); renderPreview(); }, 340);
  };
  document.getElementById('toggle-sidebar').addEventListener('click', toggle);
  window.addEventListener('keydown', (e) => {
    if (document.activeElement && /INPUT|SELECT|TEXTAREA/.test(document.activeElement.tagName)) return;
    if (e.key === 't' || e.key === 'T') toggle();
  });
}

function setupRightSidebarToggle() {
  const sidebar = document.getElementById('right-sidebar');
  const viewport = document.getElementById('viewport');
  const icon = document.getElementById('toggle-right-icon');
  let hidden = false;
  const toggle = () => {
    hidden = !hidden;
    if (hidden) {
      sidebar.classList.add('hidden-bar-right');
      viewport.style.marginRight = '0';
      icon.innerHTML = '<path d="M15 18l-6-6 6-6"/>';
    } else {
      sidebar.classList.remove('hidden-bar-right');

    setTimeout(() => { resizePreview(); renderPreview(); }, 340);
  };
  document.getElementById('toggle-right-sidebar').addEventListener('click', toggle);
  window.addEventListener('keydown', (e) => {
    if (document.activeElement && /INPUT|SELECT|TEXTAREA/.test(document.activeElement.tagName)) return;
    if (e.key === 'y' || e.key === 'Y') toggle();
  });
}

// ---------------------------------------------------------------------------
// View mode + camera (drag-right = look-right)
// ---------------------------------------------------------------------------
function setupViewMode() {
  const btnEq = document.getElementById('vm-equirect');
  const btnP  = document.getElementById('vm-perspective');
  const hud   = document.getElementById('hud-3d');
  const hudFov = document.getElementById('hud-fov');
  function apply() {
    const perspective = state.viewMode === 'perspective';
    btnEq.classList.toggle('vm-active', !perspective);
    btnP .classList.toggle('vm-active',  perspective);
    hud.classList.toggle('hidden', !perspective);
    canvas.classList.toggle('grab', perspective);
    canvas.classList.toggle('grabbing', false);
    hudFov.textContent = `fov ${Math.round(state.fovDeg)}°`;
    resizePreview();
    renderPreview();
  }
  btnEq.addEventListener('click', () => { state.viewMode = 'equirect'; apply(); });
  btnP .addEventListener('click', () => { state.viewMode = 'perspective'; apply(); });
  let dragging = false, lastX = 0, lastY = 0;
  canvas.addEventListener('mousedown', (e) => {
    if (state.viewMode !== 'perspective') return;
    dragging = true; lastX = e.clientX; lastY = e.clientY;
    canvas.classList.add('grabbing'); canvas.classList.remove('grab');
    e.preventDefault();
  });
  window.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    canvas.classList.remove('grabbing');
    if (state.viewMode === 'perspective') canvas.classList.add('grab');
  });
  window.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    const dx = e.clientX - lastX;
    const dy = e.clientY - lastY;
    lastX = e.clientX; lastY = e.clientY;
    const sens = (state.fovDeg * Math.PI / 180.0) / canvas.height;
    state.yaw   += dx * sens;
    state.pitch += dy * sens;
    const PMAX = Math.PI * 0.5 - 0.01;
    if (state.pitch >  PMAX) state.pitch =  PMAX;
    if (state.pitch < -PMAX) state.pitch = -PMAX;
    renderPreview();
  });
  canvas.addEventListener('wheel', (e) => {
    if (state.viewMode !== 'perspective') return;
    e.preventDefault();
    state.fovDeg *= e.deltaY > 0 ? 1.08 : 1.0 / 1.08;
    if (state.fovDeg < 15)  state.fovDeg = 15;
    if (state.fovDeg > 120) state.fovDeg = 120;
    hudFov.textContent = `fov ${Math.round(state.fovDeg)}°`;
    renderPreview();
  }, { passive: false });
  window.addEventListener('keydown', (e) => {
    if (document.activeElement && /INPUT|SELECT|TEXTAREA/.test(document.activeElement.tagName)) return;
    if ((e.key === 'r' || e.key === 'R') && state.viewMode === 'perspective') {
      state.yaw = 0; state.pitch = 0; state.fovDeg = 75;
      hudFov.textContent = `fov ${Math.round(state.fovDeg)}°`;
      renderPreview();
    }
    if (e.key === 'v' || e.key === 'V') {
      state.viewMode = state.viewMode === 'perspective' ? 'equirect' : 'perspective';
      apply();
    }
  });
  apply();
}

function setupHiResToggle() {
  const sw = document.getElementById('hires-switch');
  const apply = () => {
    sw.classList.toggle('on', state.hiResPreview);
    resizePreview();
    renderPreview();
  };
  sw.addEventListener('click', () => { state.hiResPreview = !state.hiResPreview; apply(); });
  apply();
}

// ---------------------------------------------------------------------------
// Boot
// ---------------------------------------------------------------------------
function boot() {
  initGL();
  const seedInput = document.getElementById('seed-input');
  seedInput.value = state.uSeed;
  seedInput.addEventListener('input', () => {
    const v = parseInt(seedInput.value, 10);
    state.uSeed = isFinite(v) ? v : 0;
    scheduleRender();
  });
  document.getElementById('seed-rand').addEventListener('click', () => {
    const v = Math.floor(Math.random() * 1_000_000);
    seedInput.value = v; state.uSeed = v;
    scheduleRender();
  });
  document.getElementById('res-select').addEventListener('change', () => {
    if (state.hiResPreview) { resizePreview(); renderPreview(); }
  });
  document.getElementById('add-nebula').addEventListener('click', addNebulaLayer);
  document.getElementById('add-stars').addEventListener('click', addStarsLayer);
  document.getElementById('add-galaxy').addEventListener('click', addGalaxyLayer);
  document.getElementById('add-sun').addEventListener('click', addSunLayer);
  document.getElementById('export-btn').addEventListener('click', exportHDR);

  document.getElementById('save-preset').addEventListener('click', savePreset);
  document.getElementById('load-preset').addEventListener('click',
    () => document.getElementById('preset-file-input').click());
  document.getElementById('preset-file-input').addEventListener('change', (e) => {
    const f = e.target.files && e.target.files[0];
    if (f) loadPreset(f);
    e.target.value = '';                               // allow re-loading the same file
  });

  // Default stack — demonstrates the new mask-detail flow.
  state.layers.push(defaultNebulaLayer({
    name: 'Nebula 1', type: 'fbm', baseHue: 280,
    harmony: 'analogous', saturation: 80, lightness: 50, blendMode: 'add',
    scale: 1.0, warpStrength: 0.5,
    detailLayers: [
      defaultDetailSubLayer({ type: 'fbm', scale: 6.0, octaves: 4, strength: 0.45 }),
    ],
  }));
  state.layers.push(defaultStarsLayer({ name: 'Stars 1' }));

  setupSidebarToggle();
  setupRightSidebarToggle();
  setupViewMode();
  setupHiResToggle();
  rebuildProgram();
  renderLayerCards();

  window.addEventListener('resize', () => { resizePreview(); renderPreview(); });
  resizePreview();
  renderPreview();
}

boot();
</script>
